server:
  port: 8081

spring:
  application:
    name: book-service
  config:
    import: "configserver:"
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888} # Use localhost as fallback if config.platform isn't DNS resolvable locally
  datasource:
    url: jdbc:mysql://localhost:3306/librarydb
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
